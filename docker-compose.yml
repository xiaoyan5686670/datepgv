version: "3.9"

# PostgreSQL runs on the Mac host via Homebrew (see README for setup).
# Only backend and frontend are containerized.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datepgv-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # host.docker.internal resolves to the Mac host from inside Docker
      # Use DATABASE_URL from .env file if available, otherwise construct from individual vars
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-datepgv}:${POSTGRES_PASSWORD:-datepgv123}@host.docker.internal:5432/${POSTGRES_DB:-datepgv}}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Dockerfile.dev 跑 next dev；勿再挂载匿名卷 /app/.next，否则会盖住构建产物导致 /_next/static 404。
  # 生产仅镜像部署请用 frontend/Dockerfile 且不要挂载 ./frontend 覆盖 /app。
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: datepgv-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
