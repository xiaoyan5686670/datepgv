version: '3.8'

services:
  postgres-age:
    image: apache/age:PG16_latest
    container_name: postgres-age-test
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    volumes:
      - ./pg_age_data:/var/lib/postgresql/data
      - ./init_age.sql:/docker-entrypoint-initdb.d/init_age.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  age-viewer:
    image: apache/age-viewer:latest
    container_name: age-viewer
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres-age:
        condition: service_healthy
